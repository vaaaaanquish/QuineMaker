<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuineMaker</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header>
    <div class="lang-switch">
      <button data-lang="ja">JA</button>
      <button data-lang="en">EN</button>
    </div>
    <h1>QuineMaker</h1>
    <p><span data-i18n="tagline_pre"></span><strong>Quine</strong><span data-i18n="tagline_post"></span></p>
    <p data-i18n="tagline_browser"></p>
  </header>

  <main>
    <div class="col-left">
    <section class="panel">
      <h2 data-i18n="sec_image"></h2>
      <div id="drop" class="drop">
        <p data-i18n="drop"></p>
        <input id="file" type="file" accept="image/*" hidden />
      </div>
      <canvas id="preview" class="bitmap" data-i18n-aria="aria_preview" hidden></canvas>
    </section>

    <section class="panel">
      <h2 data-i18n="sec_settings"></h2>
      <label><span data-i18n="label_lang"></span>
        <select id="lang"></select>
      </label>
      <label><span data-i18n="label_threshold"></span>: <span id="threshVal">128</span>
        <input id="thresh" type="range" min="0" max="255" value="128" />
      </label>
      <label class="checkbox">
        <input id="invert" type="checkbox" /> <span data-i18n="invert"></span>
      </label>
      <label class="checkbox">
        <input id="colorize" type="checkbox" /> <span data-i18n="colorize"></span>
      </label>
      <label class="checkbox">
        <input id="ansi" type="checkbox" /> <span data-i18n="ansi"></span>
      </label>
      <label><span data-i18n="label_comment"></span>
        <input id="comment" type="text" value="Created by QuineMaker" data-i18n-ph="comment_ph" />
      </label>
      <button id="generate" data-i18n="btn_generate" disabled></button>
      <p id="status" class="status"></p>
    </section>
    </div>

    <section class="panel output">
      <h2 data-i18n="sec_output"></h2>
      <div class="toolbar">
        <button id="copy" data-i18n="btn_copy" disabled></button>
      </div>
      <pre id="code" class="code" data-i18n-aria="aria_code"></pre>
    </section>
  </main>

  <script type="module" src="./src/main.js"></script>
</body>
</html>
